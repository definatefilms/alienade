# Deploys on every push to main — no Cloudflare “Git webhook” required.
#
# GitHub → Settings → Secrets and variables → Actions:
#   CLOUDFLARE_API_TOKEN — Dashboard → My Profile → API Tokens (“Edit Cloudflare Workers”).
#   CLOUDFLARE_ACCOUNT_ID — Dashboard → Workers & Pages or any zone → Account ID (sidebar).

name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy worker (Wrangler static assets)
        run: npx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
