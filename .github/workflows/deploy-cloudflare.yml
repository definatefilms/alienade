# Deploys on every push to main — no Cloudflare “Git webhook” required.
#
# One-time setup (GitHub → repo → Settings → Secrets and variables → Actions):
#
#   CLOUDFLARE_API_TOKEN (required)
#     Dashboard → My Profile → API Tokens → “Edit Cloudflare Workers” (or Workers Scripts Write).
#
#   CLOUDFLARE_ACCOUNT_ID (required for CI — fixes “exit code 1” / ambiguous account)
#     Dashboard → Workers & Pages → Workers tab → overview, or any zone → right rail “Account ID”.

name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy worker (static assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
